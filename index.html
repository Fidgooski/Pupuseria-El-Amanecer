<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══════════════════════════════════════════
         BASIC SEO
    ═══════════════════════════════════════════ -->

    <!-- Page title — shows in browser tab and Google search results -->
    <title>
      Pupuseria El Amanecer | Authentic Salvadoran Food in Branson, MO
    </title>

    <!-- Description — the text Google shows under your link in search results -->
    <meta
      name="description"
      content="Pupuseria El Amanecer serves authentic handmade Salvadoran and Latin American cuisine in Branson, Missouri. Pupusas, tacos, enchiladas, broths, desserts and more. Open Monday through Saturday 10am-9pm, Sunday 10am-5pm."
    />

    <!-- Keywords — extra hints for Google about what the site is about -->
    <meta
      name="keywords"
      content="Pupuseria El Amanecer, Salvadoran food Branson, pupusas Branson Missouri, Latin American restaurant Branson, Salvadoran restaurant Missouri, authentic pupusas, Branson MO restaurant, El Amanecer Branson"
    />

    <!-- Tells Google this is the main version of the site -->
    <link rel="canonical" href="https://www.pupuseriaelAmanecer.com" />

    <!-- Author -->
    <meta name="author" content="Pupuseria El Amanecer" />

    <!-- Tells search bots to index this page and follow all links -->
    <meta name="robots" content="index, follow" />

    <!-- ═══════════════════════════════════════════
         OPEN GRAPH — Controls how the site looks
         when shared on Facebook, iMessage, etc.
    ═══════════════════════════════════════════ -->
    <meta property="og:type" content="restaurant" />
    <meta
      property="og:title"
      content="Pupuseria El Amanecer | Authentic Salvadoran Food in Branson, MO"
    />
    <meta
      property="og:description"
      content="Handmade pupusas, tacos, enchiladas, broths and more. Authentic Salvadoran and Latin American cuisine in Branson, Missouri."
    />
    <meta property="og:image" content="https://i.imgur.com/ziFHLWt.jpeg" />
    <meta property="og:url" content="https://www.pupuseriaelAmanecer.com" />
    <meta property="og:site_name" content="Pupuseria El Amanecer" />
    <meta property="og:locale" content="en_US" />

    <!-- ═══════════════════════════════════════════
         TWITTER CARD — Controls how it looks
         when shared on Twitter / X
    ═══════════════════════════════════════════ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Pupuseria El Amanecer | Authentic Salvadoran Food in Branson, MO"
    />
    <meta
      name="twitter:description"
      content="Handmade pupusas, tacos, enchiladas, broths and more. Authentic Salvadoran cuisine in Branson, Missouri."
    />
    <meta name="twitter:image" content="https://i.imgur.com/ziFHLWt.jpeg" />

    <!-- ═══════════════════════════════════════════
         LOCAL BUSINESS SCHEMA
         This is the most powerful SEO addition —
         it tells Google exactly what kind of
         business this is, where it is, and when
         it's open. This is what powers the info
         panel on Google Search and Maps.
    ═══════════════════════════════════════════ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Restaurant",
        "name": "Pupuseria El Amanecer",
        "alternateName": "Pupuseria Restaurante El Amanecer",
        "description": "Authentic Salvadoran and Latin American cuisine in Branson, Missouri. Handmade pupusas, tacos, enchiladas, broths, desserts and more.",
        "url": "https://www.pupuseriaelAmanecer.com",
        "telephone": "+14173658772",
        "image": "https://i.imgur.com/ziFHLWt.jpeg",
        "priceRange": "$$",
        "servesCuisine": ["Salvadoran", "Latin American", "Mexican"],
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "607 Historic Hwy 165 Suite 7",
          "addressLocality": "Branson",
          "addressRegion": "MO",
          "postalCode": "65616",
          "addressCountry": "US"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": 36.63233,
          "longitude": -93.2807
        },
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": [
              "Monday",
              "Tuesday",
              "Wednesday",
              "Thursday",
              "Friday",
              "Saturday"
            ],
            "opens": "10:00",
            "closes": "21:00"
          },
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Sunday"],
            "opens": "10:00",
            "closes": "17:00"
          }
        ],
        "sameAs": [
          "https://www.facebook.com/people/Pupuseria-restaurante-el-Amanecer/61579854238046/"
        ],
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "5",
          "reviewCount": "4",
          "bestRating": "5",
          "worstRating": "1"
        },
        "review": [
          {
            "@type": "Review",
            "author": { "@type": "Person", "name": "Genevieve Smith" },
            "reviewRating": { "@type": "Rating", "ratingValue": "5" },
            "reviewBody": "I've eaten their food many times and it's always delicious! I recommend the pupusas and platanos particularly."
          },
          {
            "@type": "Review",
            "author": { "@type": "Person", "name": "Kristen Tabor" },
            "reviewRating": { "@type": "Rating", "ratingValue": "5" },
            "reviewBody": "Outstanding food! Despite the humble exterior, really a fabulous dining experience. Truly delicious!!!"
          },
          {
            "@type": "Review",
            "author": { "@type": "Person", "name": "James Therrien" },
            "reviewRating": { "@type": "Rating", "ratingValue": "5" },
            "reviewBody": "Excellent food and service. I highly recommend this restaurant. The papusas were so good."
          },
          {
            "@type": "Review",
            "author": { "@type": "Person", "name": "Erick Gonzalez" },
            "reviewRating": { "@type": "Rating", "ratingValue": "5" },
            "reviewBody": "The food is amazing. Fresh made at the moment. Will definitely go back!!!"
          }
        ]
      }
    </script>

    <!-- ═══════════════════════════════════════════
         FAVICON
         Replace with a real favicon once you have
         one — ideally a square version of the logo.
         For now this prevents a browser console error.
    ═══════════════════════════════════════════ -->
    <link
      rel="icon"
      type="image/jpeg"
      href="https://i.imgur.com/ziFHLWt.jpeg"
    />
    <link rel="apple-touch-icon" href="https://i.imgur.com/ziFHLWt.jpeg" />

    <!-- Theme color — the orange brand color shows in mobile browser chrome -->
    <meta name="theme-color" content="#ff8c20" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
